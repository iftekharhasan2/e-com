<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahya Store</title>
  <style>
    /* Basic Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; background: #f5f5f5; color: #333; }

    /* Header */
    header { background: #1e90ff; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.5rem; }
    nav a { color: #fff; margin-left: 1rem; text-decoration: none; font-weight: bold; }

    /* Products */
    #products { display: flex; flex-wrap: wrap; gap: 1rem; padding: 2rem; justify-content: center; }
    .product-card { background: #fff; border-radius: 8px; padding: 1rem; width: 200px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .product-card img { width: 100%; border-radius: 8px; }
    .product-card button { margin-top: 0.5rem; padding: 0.5rem 1rem; background: #1e90ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .product-card button:hover { background: #0d6efd; }

    /* Cart */
    #cart-section { background: #fff; padding: 1rem 2rem; margin: 2rem auto; max-width: 600px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #cart-section h2 { margin-bottom: 1rem; }
    .cart-item { margin-bottom: 0.5rem; }

    /* Order Form */
    #order-form { background: #fff; padding: 1rem 2rem; margin: 2rem auto; max-width: 600px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #order-form h2 { margin-bottom: 1rem; }
    #order-form input, #order-form button { display: block; width: 100%; margin-bottom: 1rem; padding: 0.5rem; border-radius: 4px; border: 1px solid #ccc; }
    #order-form button { background: #1e90ff; color: #fff; font-weight: bold; cursor: pointer; }
    #order-form button:hover { background: #0d6efd; }

    /* Footer */
    footer { text-align: center; padding: 1rem; background: #333; color: #fff; margin-top: 2rem; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Ahya Store</h1>
    <nav>
      <a href="#products">Products</a>
      <a href="#cart-section">Cart</a>
      <a href="#order-form">Order</a>
    </nav>
  </header>

  <!-- Products Section -->
  <section id="products">
    <div class="product-card" data-id="1" data-name="Whole Chicken 1kg" data-price="200">
      <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" alt="Whole Chicken">
      <h3>Whole Chicken 1kg</h3>
      <p>৳200</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    <div class="product-card" data-id="2" data-name="Cucumber 500g" data-price="50">
      <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" alt="Cucumber">
      <h3>Cucumber 500g</h3>
      <p>৳50</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    <div class="product-card" data-id="3" data-name="Tomato 1kg" data-price="80">
      <img src="https://images.unsplash.com/photo-1582515073490-39981303a0e6" alt="Tomato">
      <h3>Tomato 1kg</h3>
      <p>৳80</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
  </section>

  <!-- Cart Section -->
  <section id="cart-section">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <p id="cart-total"></p>
  </section>

  <!-- Order Form -->
  <section id="order-form-section">
    <form id="order-form">
      <h2>Place Your Order</h2>
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="text" id="phone" placeholder="Phone" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="address" placeholder="Address" required />
      <input type="text" id="transactionId" placeholder="bKash Transaction ID" required />
      <button type="submit">Place Order</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2026 Ahya Store. All Rights Reserved.
  </footer>

  <!-- JS -->
  <script>
    // Add to Cart
    function addToCart(button) {
      const card = button.closest('.product-card');
      const id = card.dataset.id;
      const name = card.dataset.name;
      const price = parseFloat(card.dataset.price);

      let cart = JSON.parse(localStorage.getItem('cart') || '[]');

      // Check if item exists
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ id, name, price, quantity: 1 });
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
    }

    // Get cart items
    function getCartItems() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }

    // Calculate total
    function calculateTotal(items) {
      return items.reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    // Display cart
    function displayCart() {
      const cartItems = getCartItems();
      const cartContainer = document.getElementById('cart-items');
      const totalContainer = document.getElementById('cart-total');
      cartContainer.innerHTML = '';

      if (cartItems.length === 0) {
        cartContainer.innerHTML = '<p>Your cart is empty</p>';
        totalContainer.textContent = '';
        return;
      }

      cartItems.forEach(item => {
        const div = document.createElement('div');
        div.classList.add('cart-item');
        div.textContent = `${item.name} x ${item.quantity} = ৳${(item.price * item.quantity).toFixed(2)}`;
        cartContainer.appendChild(div);
      });

      totalContainer.textContent = `Total: ৳${calculateTotal(cartItems).toFixed(2)}`;
    }

    // Submit order
    async function submitOrder(event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const transactionId = document.getElementById('transactionId').value.trim();
      const items = getCartItems();

      if (!name || !phone || !email || !address || !transactionId || items.length === 0) {
        alert('Please fill all fields and ensure your cart is not empty.');
        return;
      }

      const total = calculateTotal(items);

      try {
        const res = await fetch('https://e-com-nine-rho.vercel.app/api/sub', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, address, transactionId, total, items })
        });

        const data = await res.json();
        if (res.ok) {
          alert(`Order placed successfully! Transaction ID: ${data.transactionId}`);
          localStorage.removeItem('cart');
          displayCart();
          document.getElementById('order-form').reset();
        } else {
          alert(`Error: ${data.error}`);
        }
      } catch (err) {
        console.error(err);
        alert('Failed to submit order.');
      }
    }

    document.getElementById('order-form').addEventListener('submit', submitOrder);
    displayCart();
  </script>
</body>
</html>
