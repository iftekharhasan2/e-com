<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AYHA Fashion Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#faf7f2;
}

.product-card{
transition:.35s;
}

.product-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.product-card img{
transition:.4s;
}

.product-card:hover img{
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="bg-white shadow sticky top-0 z-40">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">
AYHA <span class="text-green-700">آيَة</span>
</h1>

<button onclick="openCart()" class="relative text-xl">

<i class="fas fa-shopping-cart"></i>

<span id="cart-count"
class="absolute -top-2 -right-3 bg-green-700 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
0
</span>

</button>

</div>

</nav>


<!-- PRODUCTS -->

<section class="py-16">

<div class="max-w-7xl mx-auto px-6">

<h2 class="text-4xl font-bold text-center mb-12">
Our Collection
</h2>

<div id="product-grid"
class="grid md:grid-cols-3 gap-8">

</div>

</div>

</section>


<!-- CART OVERLAY -->

<div id="cart-overlay"
class="fixed inset-0 bg-black/40 hidden z-40"
onclick="closeCart()"></div>


<!-- CART DRAWER -->

<div id="cart-drawer"
class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-xl
transform translate-x-full transition duration-300 z-50 flex flex-col">

<div class="flex justify-between items-center p-4 border-b">

<h3 class="font-bold text-lg">
<i class="fas fa-shopping-cart mr-2"></i>
Your Cart
</h3>

<button onclick="closeCart()">
<i class="fas fa-times text-xl"></i>
</button>

</div>

<div id="cart-items"
class="flex-1 overflow-y-auto p-4 space-y-3"></div>

<div class="p-4 border-t">

<div class="flex justify-between mb-3 font-semibold">
<span>Subtotal</span>
<span id="cart-subtotal">৳0</span>
</div>

<button onclick="openCheckout()"
class="bg-green-700 text-white w-full py-3 rounded-lg">
Checkout
</button>

</div>

</div>


<!-- CHECKOUT MODAL -->

<div id="checkout-modal"
class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center">

<div class="bg-white w-full max-w-md rounded-xl p-6">

<div class="flex justify-between items-center mb-4">
<h3 class="font-bold text-lg">Checkout</h3>
<button onclick="closeCheckout()">
<i class="fas fa-times"></i>
</button>
</div>

<div class="bg-green-50 border rounded-lg p-3 mb-4 text-sm">

<p class="font-semibold text-green-700 mb-2">bKash Payment</p>

<ol class="list-decimal list-inside text-xs space-y-1">

<li>Open bKash → Send Money</li>
<li>Send <b id="bkash-total">0</b> BDT</li>
<li>Copy Transaction ID</li>
<li>Paste below</li>

</ol>

</div>

<form onsubmit="placeOrder(event)" class="space-y-3">

<input required placeholder="Name"
class="w-full border p-2 rounded">

<input required placeholder="Phone"
class="w-full border p-2 rounded">

<textarea required placeholder="Address"
class="w-full border p-2 rounded"></textarea>

<input required placeholder="bKash Transaction ID"
class="w-full border p-2 rounded">

<button
class="bg-green-700 text-white w-full py-3 rounded-lg">
Confirm Order
</button>

</form>

</div>

</div>


<script>


/* PRODUCTS */

const products=[

{
id:1,
name:"Premium Panjabi",
price:2200,
image:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"
},

{
id:2,
name:"Traditional Kurta",
price:1950,
image:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"
},

{
id:3,
name:"Classic Panjabi",
price:2400,
image:"https://images.unsplash.com/photo-1610652492500-ded49ceeb378"
}

]


/* RENDER PRODUCTS */

const grid=document.getElementById("product-grid")

products.forEach(p=>{

grid.innerHTML+=`

<div class="product-card bg-white rounded-xl overflow-hidden">

<img src="${p.image}" class="h-64 w-full object-cover">

<div class="p-6">

<h3 class="font-semibold mb-2">${p.name}</h3>

<p class="text-green-700 font-bold mb-4">
৳${p.price}
</p>

<button onclick="addToCart(${p.id})"
class="bg-green-700 text-white w-full py-2 rounded">
Add To Cart
</button>

</div>

</div>

`

})


/* CART LOGIC */

let cart={}


function addToCart(id){

const product=products.find(p=>p.id===id)

if(!cart[id]){
cart[id]={...product,qty:1}
}else{
cart[id].qty++
}

updateCart()

}


function updateCart(){

const items=Object.values(cart)

const container=document.getElementById("cart-items")

container.innerHTML=""

let subtotal=0
let count=0


items.forEach(item=>{

subtotal+=item.price*item.qty
count+=item.qty

container.innerHTML+=`

<div class="flex items-center justify-between border p-2 rounded">

<div>

<p class="font-medium text-sm">${item.name}</p>
<p class="text-xs text-gray-500">৳${item.price}</p>

</div>

<div class="flex items-center gap-2">

<button onclick="changeQty(${item.id},-1)"
class="px-2 border rounded">-</button>

<span>${item.qty}</span>

<button onclick="changeQty(${item.id},1)"
class="px-2 border rounded">+</button>

<button onclick="removeItem(${item.id})"
class="text-red-500 ml-2">
<i class="fas fa-trash"></i>
</button>

</div>

</div>

`

})


document.getElementById("cart-count").innerText=count

document.getElementById("cart-subtotal").innerText="৳"+subtotal

document.getElementById("bkash-total").innerText=subtotal


if(items.length===0){
container.innerHTML="<p class='text-gray-400'>Cart empty</p>"
}

}


function changeQty(id,delta){

cart[id].qty+=delta

if(cart[id].qty<=0){
delete cart[id]
}

updateCart()

}


function removeItem(id){

delete cart[id]

updateCart()

}


/* CART UI */

function openCart(){

document.getElementById("cart-drawer")
.classList.remove("translate-x-full")

document.getElementById("cart-overlay")
.classList.remove("hidden")

}


function closeCart(){

document.getElementById("cart-drawer")
.classList.add("translate-x-full")

document.getElementById("cart-overlay")
.classList.add("hidden")

}


/* CHECKOUT */

function openCheckout(){

if(Object.keys(cart).length===0){
alert("Cart empty")
return
}

document.getElementById("checkout-modal")
.classList.remove("hidden")

}


function closeCheckout(){

document.getElementById("checkout-modal")
.classList.add("hidden")

}


function placeOrder(e){

e.preventDefault()

alert("Order placed successfully!")

cart={}

updateCart()

closeCheckout()

closeCart()

}

</script>

</body>
</html>
