<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahya Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family: 'Inter', sans-serif; background:#f7f7f7; color:#333; }
  a { text-decoration:none; color:inherit; }
  h1,h2,h3,h4 { margin:0; }
  button { cursor:pointer; transition:0.3s; }

  /* Header */
  header { background:#1e90ff; color:#fff; display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; position:sticky; top:0; z-index:1000; }
  header .logo { font-size:1.8rem; font-weight:700; }
  nav a { margin-left:1.5rem; font-weight:600; color:#fff; transition:0.3s; }
  nav a:hover { color:#ffd700; }

  /* Hero */
  .hero { background:#0d6efd url('https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf') center/cover no-repeat; color:#fff; text-align:center; padding:6rem 2rem; border-radius:0 0 50% 50%/20%; margin-bottom:2rem; }
  .hero h2 { font-size:2.5rem; margin-bottom:1rem; }
  .hero p { font-size:1.2rem; margin-bottom:2rem; }
  .hero button { background:#ffd700; border:none; padding:1rem 2rem; font-weight:600; border-radius:6px; }
  .hero button:hover { background:#e6c200; }

  /* Products Grid */
  #products { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:2rem; padding:2rem; max-width:1200px; margin:0 auto; }
  .product-card { background:#fff; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); overflow:hidden; transition:0.3s; display:flex; flex-direction:column; justify-content:space-between; }
  .product-card:hover { transform:translateY(-5px); box-shadow:0 6px 15px rgba(0,0,0,0.15); }
  .product-card img { width:100%; height:180px; object-fit:cover; }
  .product-card .info { padding:1rem; flex-grow:1; display:flex; flex-direction:column; justify-content:space-between; }
  .product-card h3 { font-size:1.1rem; margin-bottom:0.5rem; font-weight:600; }
  .product-card p { font-weight:600; margin-bottom:1rem; }
  .product-card button { background:#1e90ff; color:#fff; border:none; padding:0.6rem 1rem; border-radius:6px; font-weight:600; }
  .product-card button:hover { background:#0d6efd; }

  /* Cart Sidebar */
  #cart-drawer { position:fixed; top:0; right:-400px; width:360px; height:100%; background:#fff; box-shadow:-4px 0 20px rgba(0,0,0,0.1); transition:0.3s; padding:2rem; z-index:1001; display:flex; flex-direction:column; }
  #cart-drawer.open { right:0; }
  #cart-drawer h2 { margin-bottom:1.5rem; font-weight:700; font-size:1.4rem; }
  .cart-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; padding:0.5rem 0; border-bottom:1px solid #eee; }
  .cart-item span { font-weight:500; }
  .quantity-controls { display:flex; align-items:center; gap:0.5rem; background:#f2f2f2; border-radius:6px; padding:2px 4px; }
  .quantity-controls button { background:#1e90ff; color:#fff; border:none; border-radius:4px; width:28px; height:28px; font-weight:600; display:flex; justify-content:center; align-items:center; }
  .quantity-controls button:hover { background:#0d6efd; }
  .quantity-controls span { min-width:24px; text-align:center; font-weight:600; }
  #cart-total { margin-top:auto; font-weight:700; font-size:1.2rem; margin-bottom:1rem; }
  #close-cart { align-self:flex-end; background:none; border:none; font-size:1.5rem; cursor:pointer; margin-bottom:1rem; }

  /* Order Form Modal */
  #order-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1002; }
  #order-modal.open { display:flex; }
  #order-form { background:#fff; padding:2rem; border-radius:12px; width:90%; max-width:500px; display:flex; flex-direction:column; }
  #order-form input, #order-form button { margin-bottom:1rem; padding:0.7rem; border-radius:6px; border:1px solid #ccc; font-size:1rem; }
  #order-form button { background:#1e90ff; color:#fff; border:none; font-weight:600; }
  #order-form button:hover { background:#0d6efd; }
  #close-order { align-self:flex-end; background:none; border:none; font-size:1.5rem; cursor:pointer; margin-bottom:1rem; }

  /* Footer */
  footer { text-align:center; padding:2rem; background:#333; color:#fff; margin-top:2rem; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Ahya Store</div>
  <nav>
    <a href="#products">Products</a>
    <a href="#" id="cart-toggle">Cart 🛒 (<span id="cart-count">0</span>)</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <h2>Fresh & Organic Products Delivered</h2>
  <p>Order online and enjoy the best farm-fresh goods.</p>
  <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Shop Now</button>
</section>

<!-- Products Grid -->
<section id="products">
  <div class="product-card" data-id="1" data-name="Whole Chicken 1kg" data-price="200">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" alt="Whole Chicken">
    <div class="info">
      <h3>Whole Chicken 1kg</h3>
      <p>৳200</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>
  <div class="product-card" data-id="2" data-name="Cucumber 500g" data-price="50">
    <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" alt="Cucumber">
    <div class="info">
      <h3>Cucumber 500g</h3>
      <p>৳50</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>
  <div class="product-card" data-id="3" data-name="Tomato 1kg" data-price="80">
    <img src="https://images.unsplash.com/photo-1582515073490-39981303a0e6" alt="Tomato">
    <div class="info">
      <h3>Tomato 1kg</h3>
      <p>৳80</p>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>
</section>

<!-- Cart Sidebar -->
<div id="cart-drawer">
  <button id="close-cart">&times;</button>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <div id="cart-total"></div>
  <button onclick="openOrderModal()" style="margin-top:1rem;">Checkout</button>
</div>

<!-- Order Modal -->
<div id="order-modal">
  <form id="order-form">
    <button id="close-order">&times;</button>
    <h2>Place Your Order</h2>
    <input type="text" id="name" placeholder="Full Name" required />
    <input type="text" id="phone" placeholder="Phone" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="text" id="address" placeholder="Address" required />
    <input type="text" id="transactionId" placeholder="bKash Transaction ID" required />
    <button type="submit">Place Order</button>
  </form>
</div>

<footer>
  &copy; 2026 Ahya Store. All Rights Reserved.
</footer>

<script>
  // CART FUNCTIONS
  function getCartItems(){ return JSON.parse(localStorage.getItem('cart') || '[]'); }
  function saveCartItems(items){ localStorage.setItem('cart', JSON.stringify(items)); }
  function calculateTotal(items){ return items.reduce((sum,i)=>sum+i.price*i.quantity,0); }

  function displayCart(){
    const items=getCartItems();
    const container=document.getElementById('cart-items');
    const totalEl=document.getElementById('cart-total');
    const countEl=document.getElementById('cart-count');
    container.innerHTML='';
    if(items.length===0){ container.innerHTML='<p>Your cart is empty</p>'; totalEl.textContent=''; countEl.textContent='0'; return; }
    
    items.forEach(item=>{
      const div=document.createElement('div');
      div.classList.add('cart-item');
      div.innerHTML=`
        <span>${item.name}</span>
        <div class="quantity-controls">
          <button onclick="updateQuantity('${item.id}', -1)">-</button>
          <span>${item.quantity}</span>
          <button onclick="updateQuantity('${item.id}', 1)">+</button>
        </div>
        <span>৳${(item.price*item.quantity).toFixed(2)}</span>
      `;
      container.appendChild(div);
    });
    totalEl.textContent=`Total: ৳${calculateTotal(items).toFixed(2)}`;
    countEl.textContent=items.reduce((sum,i)=>sum+i.quantity,0);
  }

  function addToCart(btn){
    const card=btn.closest('.product-card');
    const id=card.dataset.id;
    const name=card.dataset.name;
    const price=parseFloat(card.dataset.price);
    let cart=getCartItems();
    const existing=cart.find(i=>i.id===id);
    if(existing){ existing.quantity+=1; } else { cart.push({id,name,price,quantity:1}); }
    saveCartItems(cart);
    displayCart();
  }

  function updateQuantity(id, change){
    let cart=getCartItems();
    const item=cart.find(i=>i.id===id);
    if(item){
      item.quantity+=change;
      if(item.quantity<=0) cart=cart.filter(i=>i.id!==id);
      saveCartItems(cart);
      displayCart();
    }
  }

  // Cart drawer toggle
  const cartDrawer=document.getElementById('cart-drawer');
  document.getElementById('cart-toggle').onclick=()=>cartDrawer.classList.add('open');
  document.getElementById('close-cart').onclick=()=>cartDrawer.classList.remove('open');

  // Order modal
  const orderModal=document.getElementById('order-modal');
  function openOrderModal(){ orderModal.classList.add('open'); }
  document.getElementById('close-order').onclick=()=>orderModal.classList.remove('open');

  // Submit order
  document.getElementById('order-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const name=document.getElementById('name').value.trim();
    const phone=document.getElementById('phone').value.trim();
    const email=document.getElementById('email').value.trim();
    const address=document.getElementById('address').value.trim();
    const transactionId=document.getElementById('transactionId').value.trim();
    const items=getCartItems();
    if(!name||!phone||!email||!address||!transactionId||items.length===0){ alert('Fill all fields & cart not empty'); return; }
    const total=calculateTotal(items);
    try{
      const res=await fetch('https://e-com-nine-rho.vercel.app/api/sub',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,phone,email,address,transactionId,total,items})
      });
      const data=await res.json();
      if(res.ok){ alert(`Order placed! Transaction ID: ${data.transactionId}`); localStorage.removeItem('cart'); displayCart(); orderModal.classList.remove('open'); document.getElementById('order-form').reset(); }
      else alert(`Error: ${data.error}`);
    }catch(err){ console.error(err); alert('Failed to submit order'); }
  });

  displayCart();
</script>
</body>
</html>
