<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Basic styles for demo */
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    nav, footer { background:#333; color:#fff; padding:1rem; text-align:center; }
    .hero-section { padding:2rem; background:#f5f5f5; text-align:center; }
    #product-container { display:flex; flex-wrap:wrap; gap:1rem; padding:2rem; justify-content:center; }
    .product-card { border:1px solid #ddd; padding:1rem; width:200px; text-align:center; }
    button { cursor:pointer; padding:0.5rem 1rem; margin-top:0.5rem; }
    /* Cart Sidebar */
    #cart-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:99; }
    #cart-sidebar { position:fixed; top:0; right:0; width:300px; height:100%; background:#fff; box-shadow:-2px 0 5px rgba(0,0,0,0.3); padding:1rem; overflow-y:auto; transform:translateX(100%); transition:0.3s; z-index:100; }
    #cart-sidebar.open { transform:translateX(0); }
    .cart-item { display:flex; justify-content:space-between; margin-bottom:1rem; }
    /* Checkout Modal */
    #checkout-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:101; }
    #checkout-modal.open { display:flex; }
    .checkout-content { background:#fff; padding:2rem; width:90%; max-width:400px; border-radius:8px; }
    .checkout-content input, .checkout-content button { width:100%; margin-top:0.5rem; padding:0.5rem; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span>My Shop</span>
    <button onclick="openCartSidebar()">🛒 Cart (<span id="cart-count">0</span>)</button>
  </nav>

  <!-- HERO -->
  <section class="hero-section">
    <h1>Welcome to Our Store</h1>
    <p>Browse products and add them to your cart</p>
  </section>

  <!-- PRODUCTS -->
  <section id="products">
    <div id="product-container"></div>
  </section>

  <!-- CART SIDEBAR -->
  <div id="cart-overlay" onclick="closeCartSidebar()"></div>
  <div id="cart-sidebar">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <hr>
    <p>Total: $<span id="cart-total">0.00</span></p>
    <button onclick="proceedToCheckout()">Checkout</button>
  </div>

  <!-- CHECKOUT MODAL -->
  <div id="checkout-modal">
    <div class="checkout-content">
      <h2>Checkout</h2>
      <form id="checkout-form">
        <input type="text" name="name" placeholder="Name" required>
        <input type="tel" name="phone" placeholder="Phone" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="transactionId" placeholder="Transaction ID" required>
        <button type="submit">Place Order</button>
        <button type="button" onclick="toggleCheckoutModal()">Cancel</button>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; 2026 My Shop. All rights reserved.
  </footer>

  <!-- SCRIPTS -->
  <script>
    // SAMPLE PRODUCTS
    const products = [
      { id: 1, name: 'Whole Chicken (3kg)', price: 1260, image: 'image/image1.png' },
      { id: 2, name: 'Chicken Leg', price: 450, image: 'image/image2.png' },
      { id: 3, name: 'Eggs (12pcs)', price: 180, image: 'image/image3.png' }
    ];

    let cart = {};

    function renderProducts() {
      const container = document.getElementById('product-container');
      container.innerHTML = '';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.name}" style="width:100%; height:150px; object-fit:cover;">
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        `;
        container.appendChild(card);
      });
    }

    function addToCart(id) {
      if (!cart[id]) cart[id] = { ...products.find(p=>p.id===id), quantity:1 };
      else cart[id].quantity++;
      updateCartUI();
    }

    function removeFromCart(id) {
      delete cart[id];
      updateCartUI();
    }

    function changeCartQty(id, delta) {
      if(cart[id]) {
        cart[id].quantity += delta;
        if(cart[id].quantity <= 0) removeFromCart(id);
        else updateCartUI();
      }
    }

    function updateCartUI() {
      const itemsContainer = document.getElementById('cart-items');
      const countEl = document.getElementById('cart-count');
      const totalEl = document.getElementById('cart-total');
      itemsContainer.innerHTML = '';
      let total = 0, count = 0;
      for (const id in cart) {
        const item = cart[id];
        total += item.price * item.quantity;
        count += item.quantity;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <span>${item.name} x ${item.quantity}</span>
          <span>
            $${(item.price*item.quantity).toFixed(2)}
            <button onclick="changeCartQty(${id},1)">+</button>
            <button onclick="changeCartQty(${id},-1)">-</button>
            <button onclick="removeFromCart(${id})">🗑️</button>
          </span>
        `;
        itemsContainer.appendChild(div);
      }
      countEl.innerText = count;
      totalEl.innerText = total.toFixed(2);
    }

    function openCartSidebar() {
      document.getElementById('cart-sidebar').classList.add('open');
      document.getElementById('cart-overlay').style.display = 'block';
    }
    function closeCartSidebar() {
      document.getElementById('cart-sidebar').classList.remove('open');
      document.getElementById('cart-overlay').style.display = 'none';
    }

    function proceedToCheckout() {
      toggleCheckoutModal();
      closeCartSidebar();
    }

    function toggleCheckoutModal() {
      document.getElementById('checkout-modal').classList.toggle('open');
    }

    async function handleCheckout(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        name: form.name.value,
        phone: form.phone.value,
        email: form.email.value,
        address: form.address.value,
        transactionId: form.transactionId.value,
        total: parseFloat(document.getElementById('cart-total').innerText),
        items: Object.values(cart)
      };

      try {
        const res = await fetch('/api/sub', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if(json.success){
          alert(`Order placed! Transaction ID: ${json.transactionId}`);
          cart = {};
          updateCartUI();
          toggleCheckoutModal();
          form.reset();
        } else {
          alert('Error: '+ (json.error || 'Unknown error'));
        }
      } catch(err) {
        console.error(err);
        alert('Failed to submit order');
      }
    }

    document.getElementById('checkout-form').addEventListener('submit', handleCheckout);

    // INIT
    renderProducts();
    updateCartUI();
  </script>

</body>
</html>
